services:
  # Single Web Service: Express API + React static build
  - type: web
    name: a-blog-allinone
    env: node
    plan: free
    buildCommand: npm install --prefix frontend && npm install --prefix backend && npm run build --prefix frontend
    startCommand: npm run start --prefix backend
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: GEMINI_API_KEY
        sync: false
      - key: PEXELS_API_KEY
        sync: false
      - key: CORS_ORIGIN
        value: "*" # 초기 테스트를 위해 와일드카드 허용 (추후 프론트엔드 주소로 제한 권장)
      - key: RENDER
        value: true
