<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=652, height=488, initial-scale=1.0">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            width: 652px; height: 488px;
            background-color: #FAFAFA;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            position: relative;
            overflow: hidden;
        }
        
        .bg-shape-1 {
            position: absolute; top: -120px; right: -80px;
            width: 350px; height: 350px; border-radius: 50%;
            background: radial-gradient(circle, rgba(0,191,165,0.08) 0%, rgba(250,250,250,0) 70%);
            z-index: 0;
        }
        .bg-shape-2 {
            position: absolute; bottom: -80px; left: -80px;
            width: 300px; height: 300px; border-radius: 50%;
            background: radial-gradient(circle, rgba(0,77,64,0.05) 0%, rgba(250,250,250,0) 70%);
            z-index: 0;
        }

        .content {
            position: relative; z-index: 10;
            display: flex; width: 100%; height: 100%;
            padding: 50px 30px 50px 40px;
        }

        /* Left Side: Typography */
        .text-section {
            flex: 1.35;
            display: flex; flex-direction: column; justify-content: center;
        }
        .top-label {
            color: #00BFA5; font-size: 14px; font-weight: 800;
            margin-bottom: 12px; letter-spacing: 0.2px;
        }
        .main-title {
            color: #1A1A1A; font-size: 30px; font-weight: 800;
            line-height: 1.35; margin: 0 0 14px 0;
            letter-spacing: -0.6px; text-shadow: 0 2px 4px rgba(0,0,0,0.02);
            word-break: keep-all;
        }
        .main-title .highlight {
            color: #004D40;
        }
        .sub-title {
            color: #444444; font-size: 16px; font-weight: 500;
            line-height: 1.45; margin: 0 0 24px 0; letter-spacing: -0.3px;
        }

        .badges { display: flex; flex-direction: column; gap: 8px; }
        .badge-row { display: flex; gap: 8px; }
        .badge {
            background-color: #004D40; color: #FFFFFF;
            padding: 7px 12px; border-radius: 6px; font-size: 13px; font-weight: 600;
            display: inline-flex; align-items: center;
            box-shadow: 0 3px 6px rgba(0,77,64,0.15);
            letter-spacing: -0.2px;
        }
        .badge.coral { background-color: #FF6B6B; box-shadow: 0 3px 6px rgba(255,107,107,0.15); }
        .badge.gray { background-color: #333333; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }

        /* Right Side: Visuals */
        .visual-section {
            flex: 0.95; position: relative; display: flex;
            align-items: center; justify-content: center;
        }
        
        .dashboard-card {
            width: 260px; height: 340px; background: #FFFFFF;
            border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border: 2px solid #E8F5E9; position: absolute; right: -10px; top: 30px;
            padding: 16px; display: flex; flex-direction: column; gap: 12px;
        }
        .dash-header {
            display: flex; gap: 6px; border-bottom: 1px solid #F0F0F0; padding-bottom: 12px;
        }
        .dash-dot { width: 10px; height: 10px; border-radius: 50%; background: #E0E0E0; }
        .dash-dot:nth-child(1) { background: #FF6B6B; }
        .dash-dot:nth-child(2) { background: #FFD93D; }
        .dash-dot:nth-child(3) { background: #00BFA5; }

        .dash-body { flex: 1; display: flex; flex-direction: column; gap: 8px; position: relative;}
        
        .mini-tag {
            position: absolute; top: -10px; right: 0;
            background: #00BFA5; color: #FFF; font-size: 10px; font-weight: 700;
            padding: 3px 6px; border-radius: 4px; letter-spacing: -0.5px;
        }

        .dash-line { height: 8px; border-radius: 4px; background: #F0F0F0; width: 100%; }
        .dash-line.short { width: 60%; }
        .dash-line.medium { width: 85%; }
        .dash-line.green { background: #E8F5E9; }

        .dash-image {
            height: 70px; border-radius: 8px; background: #E8F5E9;
            width: 100%; margin-bottom: 4px; display: flex;
            align-items: center; justify-content: center;
        }
        .dash-image svg { width: 24px; height: 24px; fill: #A5D6A7; }

        /* Floating elements */
        .float-photo {
            position: absolute; width: 85px; height: 95px; background: #FFFFFF;
            border-radius: 8px; box-shadow: 0 12px 24px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.03); left: -40px; top: 50px;
            transform: rotate(-6deg); padding: 6px; display: flex; flex-direction: column;
            z-index: 5;
        }
        .float-photo .img-ph { flex: 1; background: #00BFA5; border-radius: 4px; opacity: 0.15; }
        .float-photo-tag {
            position: absolute; top: -10px; left: -10px; background: #004D40; color: #fff;
            font-size: 10px; font-weight: 700; padding: 3px 6px; border-radius: 4px;
        }

        .float-memo {
            position: absolute; width: 110px; height: 60px; background: #FF6B6B;
            border-radius: 8px; box-shadow: 0 12px 24px rgba(255,107,107,0.3);
            right: -25px; bottom: 40px; transform: rotate(4deg);
            padding: 10px; color: #FFF; display: flex; align-items: center; justify-content: center;
            z-index: 5;
        }
        .float-memo svg { width: 24px; height: 24px; fill: #FFF; margin-right: 6px; }

        .float-check {
            position: absolute; width: 54px; height: 54px; background: #00BFA5;
            border-radius: 50%; box-shadow: 0 10px 20px rgba(0,191,165,0.3);
            left: 10px; bottom: 60px; display: flex; align-items: center; justify-content: center;
            z-index: 6;
        }
        .float-check svg {
            width: 28px; height: 28px; stroke: #FFFFFF; stroke-width: 3;
            stroke-linecap: round; stroke-linejoin: round; fill: none;
        }
    </style>
</head>
<body>
    <div class="bg-shape-1"></div>
    <div class="bg-shape-2"></div>
    
    <div class="content">
        <div class="text-section">
            <div class="top-label">M.GO 블로그 올인원</div>
            <h1 class="main-title"><span class="highlight">검색최적화</span> 블로그 포스팅<br>상품 후기 초안 한 번에</h1>
            <p class="sub-title">사진+메모만 넣으면<br>후기형 포스팅 초안 완성</p>
            
            <div class="badges">
                <div class="badge-row">
                    <span class="badge">콘텐츠 메이커</span>
                    <span class="badge coral">상품 후기 메이커</span>
                </div>
                <div class="badge-row">
                    <span class="badge gray">글 구조 체크</span>
                </div>
            </div>
        </div>

        <div class="visual-section">
            <div class="dashboard-card">
                <div class="dash-header">
                    <div class="dash-dot"></div>
                    <div class="dash-dot"></div>
                    <div class="dash-dot"></div>
                </div>
                <div class="dash-body">
                    <div class="mini-tag">초안 생성</div>
                    <div class="dash-image">
                        <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                    </div>
                    <div class="dash-line green"></div>
                    <div class="dash-line medium"></div>
                    <div class="dash-line short"></div>
                    <div class="dash-line medium"></div>
                    <div class="dash-image" style="height: 40px; margin-top: 4px;"></div>
                </div>
            </div>

            <div class="float-photo">
                <div class="float-photo-tag">검색형</div>
                <div class="img-ph"></div>
                <div style="height: 10px; margin-top: 6px; border-radius: 2px; background: #F0F0F0; width: 70%;"></div>
            </div>

            <div class="float-check">
                <svg viewBox="0 0 24 24">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>

            <div class="float-memo">
                <svg viewBox="0 0 24 24">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13" stroke="#FFF" stroke-width="2" stroke-linecap="round"></line>
                    <line x1="16" y1="17" x2="8" y2="17" stroke="#FFF" stroke-width="2" stroke-linecap="round"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                <div style="font-size: 15px; font-weight: 700;">후기형</div>
            </div>
        </div>
    </div>
</body>
</html>
