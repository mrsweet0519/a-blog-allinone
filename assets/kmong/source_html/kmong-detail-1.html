<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            width: 1080px; height: 1920px;
            background-color: #FAFAFA;
            font-family: 'Pretendard', sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        .header { text-align: center; margin-bottom: 80px; }
        .header h2 { font-size: 36px; color: #00BFA5; font-weight: 800; margin: 0 0 24px 0; }
        .header h1 { font-size: 64px; color: #111; font-weight: 800; margin: 0; line-height: 1.3; letter-spacing: -1.5px; }
        
        .avatar { width: 300px; height: 300px; margin-bottom: 40px; border-radius: 50%; border: 6px solid #FFF; box-shadow: 0 20px 40px rgba(0,0,0,0.1); object-fit: cover; object-position: center 20%;}

        .cards {
            display: flex; flex-direction: column; gap: 30px; width: 100%; max-width: 800px;
        }
        
        .card {
            background: #FFFFFF; border-radius: 30px; padding: 40px 50px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.04);
            font-size: 32px; color: #333; font-weight: 700; letter-spacing: -0.5px;
            text-align: center; transition: transform 0.3s;
        }
        
        .card:nth-child(4) {
            background: #004D40; color: #FFFFFF; box-shadow: 0 20px 40px rgba(0,77,64,0.2);
            font-size: 36px; border: none;
        }

        .footer {
            margin-top: 100px; text-align: center;
        }
        .footer p {
            font-size: 36px; color: #555; font-weight: 700; margin: 0; line-height: 1.5; letter-spacing: -1px;
        }
        .footer .highlight { color: #00BFA5; font-size: 42px; font-weight: 900; }

    </style>
</head>
<body>

    <div class="header">
        <img src="./memoji_worry.png" class="avatar" alt="Worry Memoji">
        <h2>블로그 운영, 막막하신가요?</h2>
        <h1>어쩌면 당신도<br>이런 고민을 하고 계실지 모릅니다</h1>
    </div>

    <div class="cards">
        <div class="card">뭘 써야 할지 모르겠고</div>
        <div class="card">만들어도 어디에 어떻게 써야 할지 모르겠고</div>
        <div class="card">조회수도 수익도 기대만큼 안 나오고</div>
        <div class="card">결국 “이게 맞나?” 싶은 순간이 옵니다</div>
    </div>

    <div class="footer">
        <p>그래서 필요한 건 오래 고민하는 방식이 아니라<br><span class="highlight">바로 꺼내 쓰는 블로그 초안 시스템</span>입니다</p>
    </div>

</body>
</html>
