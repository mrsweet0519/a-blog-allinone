<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=652, height=488, initial-scale=1.0">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    * { box-sizing: border-box; }
    body {
      width: 652px;
      height: 488px;
      margin: 0;
      overflow: hidden;
      background: linear-gradient(135deg, #ffffff 0%, #f0fbf7 100%);
      font-family: Pretendard, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: #0b1413;
    }
    .wrap {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 45px 28px 38px 44px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 170px;
      gap: 18px;
      align-items: center;
    }
    .glow {
      position: absolute;
      right: -130px;
      top: -130px;
      width: 350px;
      height: 350px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(0,191,165,.18), rgba(255,255,255,0) 68%);
    }
    .label {
      display: inline-flex;
      width: fit-content;
      margin-bottom: 16px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #e3f7f0;
      color: #006457;
      font-size: 20px;
      font-weight: 950;
      letter-spacing: -.4px;
    }
    h1 {
      margin: 0;
      color: #07110f;
      font-size: 51px;
      line-height: 1.08;
      font-weight: 950;
      letter-spacing: -2.8px;
    }
    .mint {
      color: #00bfa5;
      font-size: 58px;
      line-height: 1.02;
      letter-spacing: -3.3px;
    }
    .sub {
      margin-top: 21px;
      color: #004d40;
      font-size: 31px;
      line-height: 1.16;
      font-weight: 950;
      letter-spacing: -1.8px;
    }
    .visual {
      position: relative;
      height: 308px;
      z-index: 1;
      opacity: .9;
    }
    .browser {
      position: absolute;
      right: -2px;
      top: 24px;
      width: 178px;
      height: 250px;
      border-radius: 22px;
      background: #fff;
      border: 2px solid #def4ee;
      box-shadow: 0 24px 42px rgba(0,0,0,.1);
      padding: 16px;
      transform: rotate(2deg);
    }
    .dots {
      display: flex;
      gap: 7px;
      padding-bottom: 13px;
      border-bottom: 1px solid #edf3f1;
    }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #00bfa5; }
    .dot:nth-child(2) { background: #ffd36a; }
    .dot:nth-child(3) { background: #ff6b6b; }
    .doc {
      margin-top: 16px;
      border-radius: 15px;
      background: #f4fbf8;
      padding: 14px;
      height: 150px;
    }
    .doc-title {
      width: 68px;
      height: 17px;
      border-radius: 999px;
      background: #00bfa5;
      margin-bottom: 15px;
    }
    .line { height: 10px; border-radius: 999px; background: #dbe7e3; margin-bottom: 10px; }
    .line.short { width: 62%; }
    .line.mid { width: 82%; }
    .check {
      position: absolute;
      right: 118px;
      bottom: 22px;
      width: 66px;
      height: 66px;
      border-radius: 21px;
      display: grid;
      place-items: center;
      background: #00bfa5;
      color: #fff;
      font-size: 41px;
      font-weight: 950;
      box-shadow: 0 18px 28px rgba(0,191,165,.25);
      transform: rotate(-6deg);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="glow"></div>
    <main>
      <div class="label">N사 블로그용</div>
      <h1><span class="mint">검색형 포스팅</span><br>초안 작성</h1>
      <div class="sub">상품후기 초안까지<br>한 번에</div>
    </main>
    <aside class="visual" aria-hidden="true">
      <div class="browser">
        <div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
        <div class="doc">
          <div class="doc-title"></div>
          <div class="line"></div>
          <div class="line mid"></div>
          <div class="line"></div>
          <div class="line short"></div>
        </div>
      </div>
      <div class="check">✓</div>
    </aside>
  </div>
</body>
</html>
