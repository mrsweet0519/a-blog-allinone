<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            width: 1080px; height: 1920px;
            background-color: #FFFFFF;
            font-family: 'Pretendard', sans-serif;
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
            padding: 150px 80px;
        }

        .bg-shape {
            position: absolute; top: -200px; right: -200px;
            width: 800px; height: 800px; border-radius: 50%;
            background: radial-gradient(circle, rgba(0,191,165,0.08) 0%, rgba(255,255,255,0) 70%);
            z-index: 0;
        }

        .hero-section {
            display: flex; flex-direction: column; align-items: center; text-align: center;
            position: relative; z-index: 10; margin-bottom: 120px;
        }

        .avatar { width: 320px; height: 320px; border-radius: 50%; border: 6px solid #FFF; box-shadow: 0 20px 40px rgba(0,0,0,0.1); margin-bottom: 50px; object-fit: cover; object-position: center 20%;}

        .top-label {
            display: inline-block; background: #004D40; color: #FFFFFF;
            padding: 16px 32px; border-radius: 16px;
            font-size: 24px; font-weight: 800; margin-bottom: 30px; letter-spacing: 0.5px;
        }

        .main-title {
            font-size: 68px; color: #111; font-weight: 900;
            line-height: 1.4; margin: 0; letter-spacing: -2px; word-break: keep-all;
        }
        .main-title .mint { color: #00BFA5; }

        .features-section {
            display: flex; flex-direction: column; gap: 40px; width: 100%;
            position: relative; z-index: 10; align-items: center;
        }

        .feature-card {
            background: #FFFFFF; border: 3px solid #F0F0F0; border-radius: 40px;
            padding: 50px 60px; display: flex; align-items: center; gap: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.03); width: 100%; max-width: 900px;
            transition: transform 0.3s;
        }

        .feature-icon {
            width: 120px; height: 120px; border-radius: 30px;
            display: flex; align-items: center; justify-content: center;
            font-size: 60px; flex-shrink: 0; border: 4px solid #F1F3F5;
        }
        .feature-card:nth-child(1) .feature-icon { background: #E8F5E9; color: #00BFA5; border-color: #C8E6C9;}
        .feature-card:nth-child(2) .feature-icon { background: #FFEBEE; color: #FF6B6B; border-color: #FFCDD2;}
        .feature-card:nth-child(3) .feature-icon { background: #F8F9FA; color: #495057; border-color: #E9ECEF;}

        .feature-content { flex: 1; }
        .feature-title {
            font-size: 42px; color: #111; font-weight: 900; margin: 0 0 16px 0; letter-spacing: -1px;
            display: flex; align-items: center; gap: 16px;
        }
        .feature-desc {
            font-size: 28px; color: #555; font-weight: 600; margin: 0; letter-spacing: -0.5px;
        }
        
        .num-tag {
            background: #00BFA5; color: #FFF; font-size: 20px; font-weight: 900;
            padding: 8px 16px; border-radius: 12px;
        }
        .feature-card:nth-child(2) .num-tag { background: #FF6B6B; }
        .feature-card:nth-child(3) .num-tag { background: #868E96; }

    </style>
</head>
<body>
    <div class="bg-shape"></div>

    <div class="hero-section">
        <img src="./memoji_smile.png" class="avatar" alt="Smile Memoji">
        <div class="top-label">M.GO 블로그 올인원</div>
        <h1 class="main-title">
            <span class="mint">검색최적화 포스팅</span> 초안부터<br>
            <span class="mint">상품 후기 초안</span>까지 한 번에
        </h1>
    </div>

    <div class="features-section">
        <div class="feature-card">
            <div class="feature-icon">✨</div>
            <div class="feature-content">
                <h3 class="feature-title"><span class="num-tag">01</span> 콘텐츠 메이커</h3>
                <p class="feature-desc">키워드만 넣으면 포스팅 초안 구조화</p>
            </div>
        </div>

        <div class="feature-card">
            <div class="feature-icon">📸</div>
            <div class="feature-content">
                <h3 class="feature-title"><span class="num-tag">02</span> 상품 후기 메이커</h3>
                <p class="feature-desc">사진+메모만으로 후기 초안 완성</p>
            </div>
        </div>

        <div class="feature-card">
            <div class="feature-icon">✅</div>
            <div class="feature-content">
                <h3 class="feature-title"><span class="num-tag">03</span> 글 구조 체크</h3>
                <p class="feature-desc">검색 흐름까지 점검해서 바로 활용 가능</p>
            </div>
        </div>
    </div>
</body>
</html>
