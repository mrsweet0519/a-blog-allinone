<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=652, height=488, initial-scale=1.0">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    * { box-sizing: border-box; }
    body {
      width: 652px;
      height: 488px;
      margin: 0;
      overflow: hidden;
      background: linear-gradient(135deg, #ffffff 0%, #effbf7 100%);
      font-family: Pretendard, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: #07110f;
    }
    .wrap {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 38px 28px 34px 42px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 166px;
      gap: 16px;
      align-items: center;
    }
    .glow {
      position: absolute;
      right: -130px;
      top: -130px;
      width: 360px;
      height: 360px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(0,191,165,.18), rgba(255,255,255,0) 70%);
    }
    main { position: relative; z-index: 2; }
    .label {
      display: inline-flex;
      width: fit-content;
      margin-bottom: 13px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #e2f7f0;
      color: #006457;
      font-size: 19px;
      font-weight: 950;
      letter-spacing: -.4px;
    }
    h1 {
      margin: 0;
      color: #07110f;
      font-size: 54px;
      line-height: 1.02;
      font-weight: 950;
      letter-spacing: -3px;
    }
    .mint {
      color: #00bfa5;
      font-size: 57px;
      letter-spacing: -3.2px;
    }
    .sub {
      margin: 16px 0 18px;
      color: #004d40;
      font-size: 27px;
      line-height: 1.14;
      font-weight: 950;
      letter-spacing: -1.6px;
    }
    .badges {
      display: flex;
      gap: 7px;
      flex-wrap: nowrap;
    }
    .badge {
      min-height: 31px;
      padding: 7px 10px;
      border-radius: 9px;
      font-size: 14px;
      line-height: 1;
      font-weight: 950;
      letter-spacing: -.5px;
      white-space: nowrap;
      background: #004d40;
      color: #fff;
      box-shadow: 0 8px 16px rgba(0,77,64,.14);
    }
    .badge.light {
      background: #ffffff;
      color: #006457;
      border: 2px solid #cceee6;
      box-shadow: 0 8px 16px rgba(0,77,64,.08);
    }
    .visual {
      position: relative;
      z-index: 1;
      height: 300px;
      opacity: .86;
    }
    .browser {
      position: absolute;
      right: -2px;
      top: 26px;
      width: 164px;
      height: 236px;
      border-radius: 22px;
      background: #fff;
      border: 2px solid #def4ee;
      box-shadow: 0 24px 42px rgba(0,0,0,.1);
      padding: 15px;
      transform: rotate(2deg);
    }
    .dots {
      display: flex;
      gap: 7px;
      padding-bottom: 12px;
      border-bottom: 1px solid #edf3f1;
    }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #00bfa5; }
    .dot:nth-child(2) { background: #ffd36a; }
    .dot:nth-child(3) { background: #ff6b6b; }
    .doc {
      margin-top: 15px;
      border-radius: 15px;
      background: #f4fbf8;
      padding: 13px;
      height: 140px;
    }
    .doc-title {
      width: 62px;
      height: 16px;
      border-radius: 999px;
      background: #00bfa5;
      margin-bottom: 14px;
    }
    .line { height: 10px; border-radius: 999px; background: #dbe7e3; margin-bottom: 9px; }
    .line.short { width: 60%; }
    .line.mid { width: 82%; }
    .check {
      position: absolute;
      right: 104px;
      bottom: 20px;
      width: 64px;
      height: 64px;
      border-radius: 21px;
      display: grid;
      place-items: center;
      background: #00bfa5;
      color: #fff;
      font-size: 40px;
      font-weight: 950;
      box-shadow: 0 18px 28px rgba(0,191,165,.24);
      transform: rotate(-6deg);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="glow"></div>
    <main>
      <div class="label">N사 블로그용</div>
      <h1><span class="mint">검색형 포스팅</span><br>초안 작성</h1>
      <div class="sub">사진+메모 후기 초안까지</div>
      <div class="badges">
        <span class="badge">콘텐츠 메이커</span>
        <span class="badge light">후기 메이커</span>
        <span class="badge light">글 구조 체크</span>
      </div>
    </main>
    <aside class="visual" aria-hidden="true">
      <div class="browser">
        <div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
        <div class="doc">
          <div class="doc-title"></div>
          <div class="line"></div>
          <div class="line mid"></div>
          <div class="line"></div>
          <div class="line short"></div>
        </div>
      </div>
      <div class="check">✓</div>
    </aside>
  </div>
</body>
</html>
