<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; width: 1080px; height: 1920px;
            background-color: #FAFAFA; font-family: 'Pretendard', sans-serif;
            display: flex; flex-direction: column; padding: 150px 80px; align-items: center;
        }
        .header { text-align: center; margin-bottom: 80px; }
        .header h2 { font-size: 32px; color: #00BFA5; font-weight: 800; margin: 0 0 20px 0; }
        .header h1 { font-size: 64px; color: #111; font-weight: 900; margin: 0; letter-spacing: -2px; }
        
        .avatar { width: 280px; height: 280px; margin-bottom: 40px; border-radius: 50%; border: 6px solid #FFF; box-shadow: 0 20px 40px rgba(0,0,0,0.1); object-fit: cover; object-position: center 20%;}

        .steps { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 30px; position: relative; }
        .steps::before {
            content: ''; position: absolute; left: 60px; top: 40px; bottom: 40px;
            width: 6px; background: #E8F5E9; border-radius: 3px; z-index: 1;
        }
        
        .step {
            background: #FFFFFF; border-radius: 30px; padding: 35px 50px;
            display: flex; align-items: center; gap: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.03); border: 2px solid rgba(0,0,0,0.04);
            position: relative; z-index: 2; transition: transform 0.3s;
        }
        
        .step-num {
            width: 80px; height: 80px; background: #004D40; color: #FFF;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 36px; font-weight: 900; flex-shrink: 0; box-shadow: 0 10px 20px rgba(0,77,64,0.2);
        }
        .step-text { font-size: 32px; color: #111; font-weight: 800; letter-spacing: -0.5px; word-break: keep-all; }
        .step-emoji { margin-left: auto; font-size: 50px; }

        .footer {
            margin-top: auto; background: #00BFA5; color: #FFF;
            padding: 50px 60px; border-radius: 30px; text-align: center; width: 100%; max-width: 900px;
            box-shadow: 0 20px 50px rgba(0,191,165,0.25); margin-bottom: 50px;
        }
        .footer p { font-size: 42px; font-weight: 900; margin: 0; line-height: 1.4; letter-spacing: -1.5px; }
    </style>
</head>
<body>
    <div class="header">
        <img src="./memoji_laptop.png" class="avatar" alt="Laptop Memoji">
        <h2>사용 방법</h2>
        <h1>복잡한 고민 없이 딱 4단계면 끝!</h1>
    </div>

    <div class="steps">
        <div class="step">
            <div class="step-num">1</div>
            <div class="step-text">키워드 입력 / 사진 업로드</div>
            <div class="step-emoji">⌨️</div>
        </div>
        <div class="step">
            <div class="step-num">2</div>
            <div class="step-text">제목 / 구조 / 후기 흐름 확인</div>
            <div class="step-emoji">👀</div>
        </div>
        <div class="step">
            <div class="step-num">3</div>
            <div class="step-text">초안 생성</div>
            <div class="step-emoji">✨</div>
        </div>
        <div class="step">
            <div class="step-num">4</div>
            <div class="step-text">복사해서 내 블로그에 활용</div>
            <div class="step-emoji">📋</div>
        </div>
    </div>

    <div class="footer">
        <p>복잡한 설정 없이<br>바로 활용할 수 있게 만들었습니다</p>
    </div>
</body>
</html>
