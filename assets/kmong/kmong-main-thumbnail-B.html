<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=652, initial-scale=1.0">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 50px 40px;
            width: 652px; height: 488px;
            background: linear-gradient(135deg, #FFFFFF 0%, #F4F8F7 100%);
            font-family: 'Pretendard', sans-serif;
            display: flex; flex-direction: column;
            justify-content: center;
            position: relative; overflow: hidden;
        }

        /* Background Deco */
        .bg-shape {
            position: absolute; top: -100px; right: -50px;
            width: 400px; height: 400px; border-radius: 50%;
            background: radial-gradient(circle, rgba(0,191,165,0.1) 0%, rgba(255,255,255,0) 70%);
            z-index: 0;
        }

        /* Left Content */
        .content {
            position: relative; z-index: 10;
            max-width: 420px;
        }

        .label {
            display: inline-block;
            background: #004D40; color: #FFF;
            padding: 6px 14px; border-radius: 8px;
            font-size: 14px; font-weight: 800; margin-bottom: 20px;
            letter-spacing: 0px;
        }

        .main-title {
            font-size: 56px; color: #111; font-weight: 900;
            line-height: 1.25; margin: 0 0 16px 0; letter-spacing: -2px;
            text-shadow: 0 4px 10px rgba(255,255,255,0.8);
        }
        
        .main-title .highlight {
            color: #00BFA5;
        }

        .sub-title {
            font-size: 24px; color: #00897B; font-weight: 800;
            margin: 0 0 35px 0; letter-spacing: -1px;
            background: #E8F5E9; display: inline-block; padding: 8px 16px; border-radius: 10px;
            border: 2px solid rgba(0,191,165,0.2);
        }

        .badges {
            display: flex; gap: 8px; flex-wrap: wrap;
        }

        .badge {
            background: #FFFFFF; border: 2px solid #E9ECEF; color: #495057;
            padding: 6px 12px; border-radius: 8px; font-size: 14px; font-weight: 800;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03); display: flex; align-items: center; gap: 4px;
        }
        .badge.mint { border-color: #00BFA5; color: #00897B; background: #F4FBFA;}

        /* Right Illustration */
        .illustration {
            position: absolute; right: -30px; top: 50%; transform: translateY(-45%);
            width: 250px; height: 300px;
            background: #FFFFFF; border-radius: 20px;
            box-shadow: -10px 20px 40px rgba(0,77,64,0.08);
            border: 1px solid rgba(0,0,0,0.04);
            padding: 24px; z-index: 5;
            display: flex; flex-direction: column; gap: 14px;
        }

        .dash-header { display: flex; gap: 8px; border-bottom: 2px solid #F1F3F5; padding-bottom: 12px; }
        .dash-dot { width: 12px; height: 12px; border-radius: 50%; background: #E0E0E0; }
        .dash-dot:nth-child(1) { background: #FF6B6B; }
        .dash-dot:nth-child(2) { background: #FFD93D; }
        .dash-dot:nth-child(3) { background: #00BFA5; }

        .dash-body { flex: 1; display: flex; flex-direction: column; gap: 12px; }
        
        .dash-img {
            height: 80px; border-radius: 12px; background: #E8F5E9;
            width: 100%; display: flex; align-items: center; justify-content: center;
        }
        .dash-img svg { width: 32px; height: 32px; fill: #A5D6A7; }

        .dash-line { height: 12px; border-radius: 6px; background: #F1F3F5; width: 100%; }
        .dash-line.short { width: 60%; }
        .dash-line.mint { background: #00BFA5; opacity: 0.8; }

        .float-badge {
            position: absolute; left: -40px; bottom: 40px;
            background: #004D40; color: #FFF;
            padding: 10px 16px; border-radius: 12px;
            font-size: 15px; font-weight: 800;
            box-shadow: 0 10px 20px rgba(0,77,64,0.2);
            display: flex; align-items: center; gap: 6px;
        }

    </style>
</head>
<body>
    <div class="bg-shape"></div>

    <div class="content">
        <div class="label">N사 블로그용</div>
        <h1 class="main-title">
            <span class="highlight">검색형 포스팅</span><br>초안 작성
        </h1>
        <div class="sub-title">📸 사진+메모 후기 초안까지</div>
        
        <div class="badges">
            <div class="badge mint">✅ 콘텐츠 메이커</div>
            <div class="badge mint">✅ 후기 메이커</div>
            <div class="badge">글 구조 체크</div>
        </div>
    </div>

    <div class="illustration">
        <div class="dash-header">
            <div class="dash-dot"></div>
            <div class="dash-dot"></div>
            <div class="dash-dot"></div>
        </div>
        <div class="dash-body">
            <div class="dash-img">
                <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
            </div>
            <div class="dash-line mint"></div>
            <div class="dash-line"></div>
            <div class="dash-line short"></div>
            <div class="dash-line"></div>
        </div>
        <div class="float-badge">
            ✨ 초안 완성
        </div>
    </div>
</body>
</html>
